name: Prose-Number Eval (CI gate)

# ── Trigger scope (read this before "just widening" the paths) ────────────
#
# This is an OFFLINE REGRESSION LAYER over a small, frozen 19-fixture corpus
# (evals/prose_numbers/fixtures/*.json) — NOT a per-run production guard.
# consultant_engine's own runtime validate/repair loop is what gates every
# real proposal; this suite only catches regressions in *prose generation*
# quality (does the judge still correctly entail/contradict numeric claims,
# including a wrong number buried mid-passage) between changes to the
# generation prompt/model or the eval assets themselves. Every run is a real
# Claude judge call (repeat: 5 per fixture = 95 calls), so it deliberately
# does NOT run on every unrelated push/PR — see evals/prose_numbers/README.md
# ("Status") for the fuller rationale.
#
# Runs on:
#   - workflow_dispatch: manual, on demand, any time.
#   - push/pull_request to main, but ONLY when paths that could change the
#     eval's inputs or judged surface change:
#       evals/prose_numbers/**   the harness itself (fixtures, judge prompt,
#                                 promptfoo config, assert.js, gate.js)
#       consultant_engine/evals/**  figures_extractor — the ground-truth
#                                 surface the fixtures were frozen against
#     A change to consultant_engine's generation prompt (generate_proposal.py)
#     is NOT in this path filter today; if that prompt starts drifting
#     without a corresponding fixture/harness change, widen the filter to
#     include it (or run this workflow manually via workflow_dispatch).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "evals/prose_numbers/**"
      - "consultant_engine/evals/**"
  pull_request:
    branches: [main]
    paths:
      - "evals/prose_numbers/**"
      - "consultant_engine/evals/**"

jobs:
  prose-numbers-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: evals/prose_numbers/package-lock.json

      - name: Install harness dependencies
        working-directory: evals/prose_numbers
        run: npm ci

      # Secret-handling story: this job needs a real Claude API key because
      # the judge is a real LLM call (see the design constraint in
      # README.md — never "no API key needed"). If ANTHROPIC_API_KEY is
      # absent we fail LOUDLY and immediately, rather than silently skipping
      # the eval and reporting a green job — a skipped gate that looks green
      # is worse than an honest red build.
      - name: Verify ANTHROPIC_API_KEY secret is configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret is not set. The prose-number eval judge is a real Claude API call and cannot run without it. Add the secret under Settings > Secrets and variables > Actions > New repository secret, or trigger this workflow only via workflow_dispatch once it is configured." >&2
            exit 1
          fi

      # `promptfoo eval`'s own exit code reflects whether every individual
      # sample passed its assertion — but the CI threshold here is
      # majority-of-5 (>=3/5 samples per fixture), not "5/5 samples must all
      # pass". gate.js (next step) is the authoritative pass/fail check, so
      # a non-majority-affecting single-sample flake here must not abort the
      # job before gate.js gets to grade the full results.json. `|| true`
      # is deliberate: it hands the real gating decision to gate.js.
      - name: Run the promptfoo eval (judge call, repeat=5 per fixture)
        working-directory: evals/prose_numbers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx promptfoo eval -c promptfooconfig.yaml --output results.json || true

      # The authoritative gate: majority-of-5 aggregation, then require
      # 100% recall on seeded-bad-* (every planted error caught) AND 100%
      # precision on good (no false positives). Prints both metrics (not
      # just pass/fail) so a regression in either direction is visible in
      # the job log. See evals/prose_numbers/gate.js and gate.test.js (the
      # offline proof that this logic actually goes red on a missed error).
      - name: Apply the majority-of-5 gate (100% recall + 100% precision)
        working-directory: evals/prose_numbers
        run: node gate.js results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prose-numbers-eval-results
          path: evals/prose_numbers/results.json
          retention-days: 30
          if-no-files-found: warn
