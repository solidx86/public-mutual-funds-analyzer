# Prose-number entailment eval — Phase 3 (judge prompt + Promptfoo config).
# See:
#   docs/superpowers/specs/2026-07-06-track-a-prose-number-eval-design.md (§6.3, §7)
#   docs/superpowers/plans/2026-07-06-track-a-prose-number-eval.md (Phase 3)
#
# ── Models (recorded together so self-preference bias stays detectable) ──
# JUDGE model (pinned, not a floating "latest" alias, for reproducibility):
#   anthropic:messages:claude-sonnet-5
# GENERATOR model (the consultant engine's own proposal-authoring model,
#   consultant_engine/llm.py + cli.py `--model` default — NOT used by this
#   config, recorded here only so a reviewer can see the judge is a
#   different model tier/generation from the thing it grades):
#   claude-sonnet-4-6
# If the judge is ever seen rubber-stamping its own generator's prose (i.e.
# claude-sonnet-4-6-authored prose sailing through checks a stricter judge
# would catch), that is the self-preference-bias signal to watch for — the
# mitigation is switching the judge to a still-different/stronger model.
#
# ── Multi-sample repeats + the aggregation rule (state explicitly, per the
#    task brief) ──
# `repeat: 5` below makes Promptfoo issue 5 independent judge calls per
# fixture (one per configured test case x 5), so judge non-determinism shows
# up as 5 separate pass/fail rows per fixture in the eval table rather than a
# single coin-flip.
#   N = 5
#   Aggregation rule = majority-vote-of-N: a fixture is considered CAUGHT
#     (for CI-gating purposes) iff >= 3 of its 5 repeats pass their assertion
#     (assert.js, below). This is a stated policy for Phase 4's CI job to
#     implement (e.g. by grouping promptfoo's per-repeat results by test
#     description/slot_key and counting passes >= 3/5) — Phase 3's job is
#     only to wire `repeat: 5` so the 5 independent judge calls exist and are
#     each independently graded; it does not itself compute the majority
#     vote. Per the design spec §6.4 / §11, the CI threshold for the
#     `seeded-bad-*` set is stricter still ("must catch 100% of
#     seeded-bad-* ... across N samples") — the acceptance crux is whether
#     the buried-error fixtures are caught, not just whether they clear a
#     bare majority.
#
# IMPLEMENTED (Phase 4): `gate.js` (same directory) is the deterministic
# wrapper that consumes `promptfoo eval --output results.json`, groups
# results by `vars.fixture_id` (NOT `slot_key`, which repeats across
# fixtures — see `gate.js`'s docstring), computes each fixture's
# majority-of-5 verdict, then requires the CI threshold stated above: 100%
# recall on `seeded-bad-*` (every planted error caught) AND 100% precision
# on `good` (no false positives) — a miss on either side exits non-zero.
# `gate.js`'s aggregation/threshold constants (`EXPECTED_REPEAT = 5`,
# `MIN_SAMPLES_FOR_MAJORITY = 3`) MUST stay consistent with this `repeat: 5`
# and with the "majority-of-5" language in README.md — if N ever changes,
# update all three together. See `.github/workflows/prose-numbers-eval.yml`
# for how the CI job wires `promptfoo eval` -> `gate.js`, and `gate.test.js`
# for the offline proof that this aggregation logic actually goes red when
# a `seeded-bad-buried` fixture's majority verdict is wrong.
description: "Prose-number entailment eval — Claude judge over the 19 frozen prose-number fixtures (why.*/watch.*/macro.impact.*, good/seeded-bad-single/seeded-bad-buried)."

prompts:
  - file://prompts/judge.md

providers:
  - id: anthropic:messages:claude-sonnet-5
    config:
      max_tokens: 2000

# One test case per fixture file (19 total), generated by
# tests/load-fixtures.js — see that file for the 1:1 fixture-to-test-case
# mapping and the exact vars/assert wiring. NOT a bare `llm-rubric`: each
# test case's assertion is the `javascript` type pointing at assert.js, which
# parses the judge's per-claim JSON, reduces `entailed` in code (never
# trusting the judge's own top-level boolean), and asserts it against the
# fixture's `expect`.
tests:
  - file://tests/load-fixtures.js

repeat: 5
